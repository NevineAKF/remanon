version: "3.9"

# ---------------------------------------------------------------------------
# Remanon service graph
# ---------------------------------------------------------------------------
# Services:
#   mock_engine — Contract B stub (OpenAI-compatible vLLM imitation), as a
#                 standalone container. Not required by `remanon` below
#                 (which runs its own in-process mock by default) — useful
#                 only if you want to point --base-url at it over the
#                 network instead.
#   remanon     — the full demo + dashboard, built from the root
#                 Dockerfile. Self-contained: ingests real Loghub data and
#                 serves the dashboard on :8080, GPU-free. `docker compose
#                 up` alone is enough to see it — no other service needed.
#
# GPU note: add `deploy.resources.reservations.devices` under a service
# when targeting a real MI300X with ROCm Docker runtime.
# ---------------------------------------------------------------------------

services:

  mock_engine:
    build:
      context: ./mock_engine
      dockerfile: Dockerfile
    image: remanon/mock_engine:dev
    container_name: remanon_mock_engine
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  remanon:
    build:
      context: ..
      dockerfile: Dockerfile
    image: remanon/remanon:dev
    container_name: remanon_demo
    ports:
      - "8080:8080"

networks:
  default:
    name: remanon_net
