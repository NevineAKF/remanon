name: Deploy Pages

# Publishes dashboard/showcase/index.html — the self-contained, honest
# showcase build — as the GitHub Pages site root on every push to main.
# Regenerated from that file on every run: nothing is ever manually copied,
# so the published page can never go stale relative to what's in the repo.

on:
  push:
    branches: ["main"]
  workflow_dispatch: # manual re-run from the Actions tab, no commit needed

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-flight run finish rather
# than racing it, since the artifact always mirrors the latest main anyway.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify the showcase build is honest before publishing it
        # Refuses to publish if a future change ever reintroduces a stale
        # or unlabeled hardware claim — this is what makes "never reverts"
        # actually true, not just a hope.
        run: |
          grep -qF "COMPUTED (projected)" dashboard/showcase/index.html || {
            echo "::error::dashboard/showcase/index.html is missing the honest 'COMPUTED (projected)' hardware label — refusing to publish."
            exit 1
          }
          grep -qF "192 GB figures are computed projections" dashboard/showcase/index.html || {
            echo "::error::dashboard/showcase/index.html is missing the provenance line — refusing to publish."
            exit 1
          }

      - name: Assemble Pages site (showcase dashboard as site root)
        run: |
          mkdir -p _site
          cp dashboard/showcase/index.html _site/index.html
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
